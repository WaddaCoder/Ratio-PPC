<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1b2a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Ratio PPC</title>
  <style>
  /* ═══════════════════════════════════════════════════════
     CSS VARIABLES — every font-size uses these. No px elsewhere.
     setFont() overrides :root and everything scales.
  ═══════════════════════════════════════════════════════ */
  :root {
    --fs-xs:   0.68rem;
    --fs-sm:   0.78rem;
    --fs-base: 0.88rem;
    --fs-lg:   1.02rem;
    --fs-xl:   1.25rem;
    --fs-2xl:  1.55rem;

    --navy:    #0d1b2a;
    --gold:    #c8a96e;
    --gold-dk: #a8843e;
    --bg:      #f2f1ed;
    --white:   #ffffff;
    --rule:    rgba(0,0,0,0.08);
    --ink:     #1a1a2e;
    --ink-lt:  rgba(0,0,0,0.42);

    --r:       12px;
    --rsm:     8px;
    --mono:    'DM Mono', 'Courier New', monospace;
    --hdr-h:   62px;

    /* Palette accent colours */
    --c-general:  #2c4a7e;
    --c-person:   #8b2535;
    --c-property: #7a4f10;
    --c-repfam:   #4a3070;
    --c-state:    #0d4a3e;
  }

  /* ═══════════════════════════════════════════════════════
     RESET
  ═══════════════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--navy); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: var(--fs-base);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { -webkit-appearance: none; appearance: none; border: none; background: none; cursor: pointer; font-family: inherit; }

  /* ═══════════════════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════════════════ */
  #hdr {
    position: fixed;
    top: 0; left: 0; right: 0;
    width: 100%; max-width: 480px;
    margin: 0 auto;
    height: var(--hdr-h);
    background: var(--navy);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    flex-shrink: 0;
  }

  #backbtn {
    width: 34px; height: 34px;
    border-radius: var(--rsm);
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.22);
    color: var(--gold);
    font-size: var(--fs-lg);
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #backbtn.vis { display: flex; }
  #backbtn:active { background: rgba(200,169,110,0.2); }

  /* ── LOGO SLOT ─────────────────────────────────────────
     Replace the div.logo-slot contents with <img> or <svg>
     when the final logo is ready. Size: 36×36px.
  ──────────────────────────────────────────────────────── */
  .logo-slot {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  #hdr-brand { flex: 1; min-width: 0; }
  #hdr-brand h1 {
    font-family: var(--mono);
    font-size: var(--fs-lg);
    font-weight: 700;
    color: #f0ece0;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  #hdr-brand h1 span { color: var(--gold); }
  #hdr-sub {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #bc {
    display: none;
    flex: 1;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  #bc b { color: var(--gold); font-weight: 700; }

  .hdr-btns { display: flex; gap: 6px; flex-shrink: 0; }
  .ibtn {
    width: 32px; height: 32px;
    border-radius: var(--rsm);
    background: rgba(200,169,110,0.08);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--gold);
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .ibtn:active { background: rgba(200,169,110,0.2); }

  /* ═══════════════════════════════════════════════════════
     SCREENS — #home and #main are alternate full-screen
     scrollable containers. Only one is active at a time.
  ═══════════════════════════════════════════════════════ */
  #home, #main {
    position: fixed;
    top: 0; bottom: 0;
    left: 0; right: 0;
    width: 100%; max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-top: var(--hdr-h);
    display: none;
    scroll-snap-type: y proximity;
  }
  #home.on, #main.on { display: block; }

  /* ═══════════════════════════════════════════════════════
     HOME — HERO STRIP
  ═══════════════════════════════════════════════════════ */
  .hero {
    background: var(--navy);
    padding: 10px 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .hero-row { display: flex; gap: 7px; }
  .hero-cell {
    flex: 1;
    background: rgba(200,169,110,0.07);
    border: 1px solid rgba(200,169,110,0.16);
    border-radius: 9px;
    padding: 8px 10px;
  }
  .hero-lbl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hero-val {
    font-size: var(--fs-sm);
    font-weight: 700;
    color: #f0ece0;
    margin-top: 2px;
  }

  /* ═══════════════════════════════════════════════════════
     HOME — SECTION DIVIDERS
  ═══════════════════════════════════════════════════════ */
  .sec-div {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 14px 6px;
    scroll-snap-align: start;
  }
  .sec-div-line {
    height: 1px;
    background: rgba(0,0,0,0.16);
    flex: 1;
  }
  .sec-div-line-sm { width: 14px; flex: none; }
  .sec-div-lbl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.28);
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════
     HOME — MODULE CARDS
  ═══════════════════════════════════════════════════════ */
  .mc {
    margin: 0 12px 7px;
    border-radius: var(--r);
    border: 1px solid rgba(0,0,0,0.07);
    border-left-width: 3px;
    padding: 12px 13px;
    display: flex;
    align-items: center;
    gap: 11px;
    cursor: pointer;
    transition: filter 0.14s, transform 0.14s;
  }
  .mc:active { filter: brightness(0.92); transform: scale(0.984); }

  .mc-icon { font-size: 18px; flex-shrink: 0; width: 30px; text-align: center; }
  .mc-info { flex: 1; min-width: 0; }
  .mc-name { font-size: var(--fs-base); font-weight: 700; color: var(--navy); line-height: 1.3; }
  .mc-sec  { font-family: var(--mono); font-size: var(--fs-xs); color: var(--ink-lt); margin-top: 2px; letter-spacing: 0.02em; }
  .mc-tag  {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: var(--rsm);
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* Palette backgrounds & accents */
  .p-general  { background:#e8edf6; border-left-color:var(--c-general); }
  .p-general .mc-tag  { background:rgba(44,74,126,0.1);  color:var(--c-general); }

  .p-person   { background:#fce8ea; border-left-color:var(--c-person); }
  .p-person .mc-tag   { background:rgba(139,37,53,0.1);  color:var(--c-person); }

  .p-property { background:#fef0e0; border-left-color:var(--c-property); }
  .p-property .mc-tag { background:rgba(122,79,16,0.1);  color:var(--c-property); }

  .p-repfam   { background:#ede8f5; border-left-color:var(--c-repfam); }
  .p-repfam .mc-tag   { background:rgba(74,48,112,0.1);  color:var(--c-repfam); }

  .p-state    { background:#e2f2ef; border-left-color:var(--c-state); }
  .p-state .mc-tag    { background:rgba(13,74,62,0.1);   color:var(--c-state); }

  /* Gateway card */
  .p-gateway {
    background: var(--navy);
    border: 1px solid rgba(200,169,110,0.28);
    border-left-width: 1px;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 14px 15px;
  }
  .p-gateway .mc-name { color: #f0ece0; font-size: var(--fs-lg); }
  .p-gateway .mc-sec  { color: rgba(200,169,110,0.4); }
  .p-gateway .mc-tag  { background:rgba(200,169,110,0.12); color:var(--gold); border:1px solid rgba(200,169,110,0.22); }
  .gw-row { display: flex; align-items: center; gap: 11px; }
  .gw-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
  .gw-chip {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    background: rgba(200,169,110,0.08);
    color: rgba(200,169,110,0.6);
    white-space: nowrap;
  }

  /* Tool cards */
  .p-tool {
    background: var(--navy);
    border-color: rgba(200,169,110,0.15);
    border-left-color: rgba(200,169,110,0.2);
  }
  .p-tool .mc-name { color: #f0ece0; }
  .p-tool .mc-sec  { color: rgba(200,169,110,0.45); }
  .p-tool .mc-tag  { background:rgba(200,169,110,0.1); color:var(--gold); }
  .tool-ico {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════
     ELEMENT VIEW — PROGRESS BAR
  ═══════════════════════════════════════════════════════ */
  .prog-bar {
    background: var(--navy);
    padding: 8px 14px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .prog-track {
    height: 3px;
    background: rgba(200,169,110,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.44s cubic-bezier(0.4,0,0.2,1);
  }

  /* ═══════════════════════════════════════════════════════
     ELEMENT VIEW — HEADER CARD
  ═══════════════════════════════════════════════════════ */
  .el-hdr {
    background: var(--navy);
    padding: 14px 16px;
    scroll-snap-align: start;
  }
  .el-step {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.5);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .el-name {
    font-size: var(--fs-xl);
    font-weight: 800;
    color: #f0ece0;
    line-height: 1.22;
    margin-bottom: 8px;
  }
  .el-op {
    display: inline-block;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: rgba(200,169,110,0.7);
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.22);
    padding: 3px 11px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .el-desc {
    font-size: var(--fs-sm);
    color: rgba(240,236,224,0.74);
    line-height: 1.66;
    margin-bottom: 12px;
  }

  /* Schedule II pills */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.02em;
    cursor: default;
    white-space: nowrap;
  }
  .pill-cog  { background:rgba(26,92,82,0.28);  color:#9edcd4; border:1px solid rgba(26,92,82,0.5); }
  .pill-ncog { background:rgba(92,42,0,0.28);   color:#e0b878; border:1px solid rgba(92,42,0,0.5); }
  .pill-warr { background:rgba(92,42,0,0.28);   color:#e0b878; border:1px solid rgba(92,42,0,0.5); }
  .pill-sum  { background:rgba(44,74,126,0.28); color:#a8c0f0; border:1px solid rgba(44,74,126,0.5); }
  .pill-bail { background:rgba(44,95,46,0.28);  color:#8ecf90; border:1px solid rgba(44,95,46,0.5); }
  .pill-nbail{ background:rgba(139,37,53,0.28); color:#f0a0a8; border:1px solid rgba(139,37,53,0.5); }
  .pill-comp { background:rgba(74,48,112,0.28); color:#c0b0f0; border:1px solid rgba(74,48,112,0.5); }
  .pill-ncomp{ background:rgba(50,50,60,0.28);  color:#b0b0c0; border:1px solid rgba(50,50,60,0.5); }

  /* ═══════════════════════════════════════════════════════
     ELEMENT VIEW — CONNECTIONS
  ═══════════════════════════════════════════════════════ */
  .conn-wrap {
    padding: 10px 14px;
    background: var(--white);
    border-top: 1px solid var(--rule);
  }
  .conn-lbl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-lt);
    margin-bottom: 7px;
  }
  .conn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .conn-pill {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    white-space: nowrap;
  }
  .conn-pill:active { transform: scale(0.93); opacity: 0.8; }
  .cp-essay     { background:#fef0e0; color:var(--c-property); border:1px solid rgba(122,79,16,0.22); }
  .cp-technique { background:#e2f2ef; color:var(--c-state);    border:1px solid rgba(13,74,62,0.22); }
  .cp-element   { background:#e8edf6; color:var(--c-general);  border:1px solid rgba(44,74,126,0.22); }
  .cp-arc       { background:#ede8f5; color:var(--c-repfam);   border:1px solid rgba(74,48,112,0.22); }

  /* ═══════════════════════════════════════════════════════
     ELEMENT VIEW — ACCORDION SECTIONS
  ═══════════════════════════════════════════════════════ */
  .acc {
    margin: 8px 12px;
    border-radius: var(--r);
    border: 1px solid var(--rule);
    overflow: hidden;
    background: var(--white);
    scroll-snap-align: start;
  }
  .acc-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.16s;
    gap: 8px;
  }
  .acc-hdr:active { background: rgba(0,0,0,0.03); }
  .acc-ttl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-lt);
    transition: color 0.18s;
    flex: 1;
  }
  .acc-ttl.open-color { color: inherit; }
  .acc-chev {
    font-size: var(--fs-sm);
    font-weight: 700;
    color: var(--ink-lt);
    transition: transform 0.24s ease;
    flex-shrink: 0;
    line-height: 1;
  }
  .acc-chev.r { transform: rotate(90deg); }

  /* Animation — all accordions use this pair */
  .aw  { max-height: 0;    overflow: hidden; transition: max-height 0.28s ease; }
  .awo { max-height: 6000px; transition: max-height 0.38s ease; }
  .acc-body { border-top: 1px solid var(--rule); }

  /* ── Legal position ─── */
  .legal-text {
    padding: 12px 14px 8px;
    font-size: var(--fs-base);
    color: var(--navy);
    line-height: 1.72;
  }
  .legal-p { margin-bottom: 10px; }
  .legal-p:last-child { margin-bottom: 0; }
  .legal-cite {
    padding: 0 14px 8px;
    font-size: var(--fs-xs);
    color: var(--ink-lt);
    font-style: italic;
    font-family: var(--mono);
  }
  .legal-link {
    display: block;
    padding: 0 14px 12px;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--c-general);
    cursor: pointer;
  }

  /* ── Sparring questions ─── */
  .sq {
    border-bottom: 1px solid var(--rule);
    padding: 10px 14px;
  }
  .sq:last-child { border-bottom: none; }
  .sq-num {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--gold-dk);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .sq-q {
    font-size: var(--fs-sm);
    color: var(--navy);
    line-height: 1.56;
    cursor: pointer;
  }
  .sq-rev-wrap { max-height: 0; overflow: hidden; transition: max-height 0.26s ease; }
  .sq-rev-wrap.o { max-height: 2000px; transition: max-height 0.34s ease; }
  .sq-rev {
    border-top: 1px solid var(--rule);
    margin-top: 8px;
    padding-top: 8px;
  }
  .sq-ans {
    font-size: var(--fs-sm);
    color: var(--navy);
    line-height: 1.62;
    margin-bottom: 5px;
  }
  .sq-cite {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--ink-lt);
    font-style: italic;
  }

  /* ── Landmark cases ─── */
  .lm {
    border-bottom: 1px solid var(--rule);
    padding: 10px 14px;
  }
  .lm:last-child { border-bottom: none; }
  .lm-case {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    color: #5c2a00;
    margin-bottom: 2px;
  }
  .lm-cit {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    color: var(--ink-lt);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .lm-vbadge {
    font-size: 7px;
    background: rgba(44,95,46,0.14);
    color: #2c5f2e;
    padding: 1px 5px;
    border-radius: 4px;
    border: 1px solid rgba(44,95,46,0.28);
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .lm-hold {
    font-size: var(--fs-sm);
    color: var(--navy);
    line-height: 1.56;
  }

  /* ═══════════════════════════════════════════════════════
     ELEMENT VIEW — JUDGEMENT CARD
  ═══════════════════════════════════════════════════════ */
  .jcard {
    margin: 8px 12px;
    padding: 14px;
    scroll-snap-align: start;
  }
  .jlbl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-lt);
    text-align: center;
    margin-bottom: 10px;
  }
  .jbtns { display: flex; gap: 10px; }
  .jbtn {
    flex: 1;
    padding: 14px;
    border-radius: var(--r);
    font-size: var(--fs-base);
    font-weight: 700;
    transition: background 0.18s, color 0.18s, transform 0.14s;
    cursor: pointer;
  }
  .jbtn:active { transform: scale(0.96); }
  .jyes { background:rgba(44,95,46,0.11);  color:#2c5f2e; }
  .jno  { background:rgba(139,37,53,0.1);  color:#8b2535; }
  .jyes.sel { background:#2c5f2e; color:#fff; }
  .jno.sel  { background:#8b2535; color:#fff; }

  /* ═══════════════════════════════════════════════════════
     RESULT SCREENS
  ═══════════════════════════════════════════════════════ */
  .result-wrap {
    padding: 50px 24px 32px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .result-icon { font-size: 52px; }
  .result-h {
    font-size: var(--fs-xl);
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
  }
  .result-sub {
    font-size: var(--fs-sm);
    color: var(--ink-lt);
    line-height: 1.5;
    max-width: 280px;
  }
  .result-btn {
    margin-top: 8px;
    padding: 12px 24px;
    border-radius: var(--r);
    background: var(--navy);
    color: #f0ece0;
    font-size: var(--fs-base);
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .result-btn:active { opacity: 0.8; }

  /* ═══════════════════════════════════════════════════════
     FLOATING SCROLL ARROW
     Lives OUTSIDE #main as sibling — immune to the
     WebKit transform + -webkit-overflow-scrolling bug.
  ═══════════════════════════════════════════════════════ */
  #fabwrap {
    position: fixed;
    top: 0; bottom: 0;
    left: 0; right: 0;
    width: 100%; max-width: 480px;
    margin: 0 auto;
    pointer-events: none;
    z-index: 60;
    display: none;
  }
  #fab {
    position: absolute;
    bottom: 76px; right: 14px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(200,169,110,0.92);
    color: #1a1408;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    box-shadow: 0 3px 12px rgba(0,0,0,0.22);
    transition: transform 0.14s;
  }
  #fab:active { transform: scale(0.91); }

  /* ═══════════════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════════════ */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 0; right: 0;
    width: 100%; max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    pointer-events: none;
    z-index: 200;
  }
  .toast-inner {
    color: #fff;
    border-radius: 24px;
    padding: 9px 18px;
    font-family: var(--mono);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 0.04em;
    box-shadow: 0 4px 18px rgba(0,0,0,0.22);
    white-space: nowrap;
    animation: toastIn 0.28s ease;
  }

  /* ═══════════════════════════════════════════════════════
     FONT BAR — scrolls with content, last child of screen
  ═══════════════════════════════════════════════════════ */
  .font-bar {
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 11px 0 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 4px;
  }
  .fb-lbl {
    font-family: var(--mono);
    font-size: var(--fs-xs);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(240,236,224,0.32);
    white-space: nowrap;
  }
  .fb-btns { display: flex; gap: 5px; }
  .fpb {
    font-family: var(--mono);
    font-weight: 700;
    border: 1px solid rgba(200,169,110,0.22);
    border-radius: 5px;
    cursor: pointer;
    padding: 5px 10px;
    line-height: 1;
    background: rgba(200,169,110,0.06);
    color: rgba(200,169,110,0.42);
    transition: background 0.18s, color 0.18s, border-color 0.18s;
  }
  .fpb.on {
    background: var(--gold);
    color: #1a1408;
    border-color: var(--gold);
  }

  /* ═══════════════════════════════════════════════════════
     ANIMATIONS
  ═══════════════════════════════════════════════════════ */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes toastOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(8px) scale(0.97); }
  }
  @keyframes jpulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.07); }
    100% { transform: scale(1); }
  }
  .ci { animation: cardIn 0.32s ease both; }

  /* ═══════════════════════════════════════════════════════
     IPAD LANDSCAPE — structural overrides only.
     No font-size rules: CSS variables handle all scaling.
  ═══════════════════════════════════════════════════════ */
  @media (min-width:1024px) and (orientation:landscape){
    #hdr, #home, #main, #fabwrap, #toast { max-width: 820px; margin: 0 auto; }
    .mc   { padding: 14px 16px; }
    .el-hdr { padding: 18px 20px; }
    .acc  { margin: 8px 16px; }
    .jcard { margin: 8px 16px; }
    .result-wrap { padding: 60px 32px; }
  }
  </style>
  <style id="fs-override"></style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────── -->
<header id="hdr">
  <button id="backbtn" onclick="goBack()" aria-label="Back">&#8592;</button>
  <div class="logo-slot">&#9878;&#xFE0F;</div><!-- LOGO SLOT -->
  <div id="hdr-brand">
    <h1>RATIO <span>PPC</span></h1>
    <div id="hdr-sub">Pakistan Penal Code 1860</div>
  </div>
  <div id="bc"></div>
  <div class="hdr-btns">
    <button class="ibtn" onclick="goHome()" title="Home" aria-label="Home">&#8962;</button>
    <button class="ibtn" title="Grid" aria-label="Grid">&#9638;</button>
  </div>
</header>

<!-- ── HOME SCREEN ────────────────────────────────────────── -->
<div id="home"></div>

<!-- ── ELEMENT / MODULE SCREEN ───────────────────────────── -->
<div id="main"></div>

<!-- ── FLOATING ARROW (outside #main — immune to WebKit bug) -->
<div id="fabwrap">
  <div id="fab" aria-label="Scroll">&#8595;</div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
var CACHE    = {};   // url → parsed JSON (never re-fetched)
var SCHED2   = {};   // section string → {cog,warr,bail,comp,n}
var LINKS_FW = {};   // "moduleId/elId" → [{type,target,label}]
var LINKS_BK = {};   // "moduleId/elId" → [{type,src,label}]
var HISTORY  = [];   // navigation stack [{type, ...}]
var CUR_MOD  = null; // current module JSON
var CUR_IDX  = 0;    // current element index
var CUR_RES  = [];   // [{id, result}]
var FS       = 15;   // current font size

/* ═══════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════ */
var $ = function(id){ return document.getElementById(id); };

function mk(tag, cls){
  var el = document.createElement(tag);
  if(cls) el.className = cls;
  return el;
}

function txt(el, t){ el.textContent = t; return el; }

/* ═══════════════════════════════════════════════════════════
   FETCH WITH CACHE
═══════════════════════════════════════════════════════════ */
function fetchJ(url){
  if(CACHE[url]) return Promise.resolve(CACHE[url]);
  return fetch(url)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status+': '+url);
      return r.json();
    })
    .then(function(d){ CACHE[url]=d; return d; });
}

/* ═══════════════════════════════════════════════════════════
   STARTUP
═══════════════════════════════════════════════════════════ */
window.addEventListener('load', function(){
  setFont(15);
  Promise.all([
    fetchJ('sched2.json').then(buildSched2).catch(function(e){ console.warn('sched2.json:', e); }),
    fetchJ('links.json').then(buildLinks).catch(function(e){   console.warn('links.json:', e); }),
    fetchJ('modules.json').then(renderHome).catch(function(e){ console.error('modules.json:', e); renderHome([]); })
  ]);
});

/* ═══════════════════════════════════════════════════════════
   INDEX BUILDERS
═══════════════════════════════════════════════════════════ */
function buildSched2(rows){
  rows.forEach(function(r){ SCHED2[r.s] = r; });
}

function buildLinks(rows){
  rows.forEach(function(lnk){
    var fk = lnk.from.module+'/'+lnk.from.element;
    if(!LINKS_FW[fk]) LINKS_FW[fk]=[];
    LINKS_FW[fk].push({ type:lnk.to.type, target:lnk.to, label:lnk.label });
    if(lnk.to.module && lnk.to.element){
      var bk = lnk.to.module+'/'+lnk.to.element;
      if(!LINKS_BK[bk]) LINKS_BK[bk]=[];
      LINKS_BK[bk].push({ type:'element', src:lnk.from, label:lnk.label });
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════════ */
function showScreen(s){
  $('home').classList.toggle('on', s==='home');
  $('main').classList.toggle('on', s==='main');
  if(s==='home'){ $('main').innerHTML=''; $('main').scrollTop=0; }
}

function updHeader(mode, modName, elName){
  var brand = $('hdr-brand');
  var bc    = $('bc');
  var back  = $('backbtn');
  if(mode==='home'){
    brand.style.display=''; bc.style.display='none'; back.classList.remove('vis');
  } else {
    brand.style.display='none'; bc.style.display='';
    bc.innerHTML = (modName||'') + (elName ? ' &rsaquo; <b>'+elName+'</b>' : '');
    back.classList.add('vis');
  }
}

function goHome(){
  HISTORY=[]; CUR_MOD=null; CUR_IDX=0; CUR_RES=[];
  showScreen('home');
  updHeader('home');
  fabHide();
}

function goBack(){
  if(!HISTORY.length){ goHome(); return; }
  var prev = HISTORY.pop();
  if(prev.type==='home'){ goHome(); }
  else if(prev.type==='el'){
    CUR_MOD=prev.mod; CUR_IDX=prev.idx; CUR_RES=prev.res||[];
    renderEl(CUR_MOD, CUR_IDX);
  } else { goHome(); }
}

/* ═══════════════════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════════════════ */
var CHAPTER_LABELS = {
  general:  'General Part',
  person:   'Offences Against Person',
  property: 'Offences Against Property',
  repfam:   'Reputation, Family & Public Order',
  state:    'State & Special Offences',
  tools:    'Thinking Tools'
};

function renderHome(mods){
  var home = $('home');
  home.innerHTML = '';
  showScreen('home');
  updHeader('home');

  // Hero
  var h = mk('div','hero');
  h.innerHTML = '<div class="hero-row">'
    + '<div class="hero-cell"><div class="hero-lbl">Mode</div><div class="hero-val">\u2630 Classroom</div></div>'
    + '<div class="hero-cell"><div class="hero-lbl">Modules</div><div class="hero-val">'+(mods.length||0)+' total</div></div>'
    + '<div class="hero-cell"><div class="hero-lbl">Build</div><div class="hero-val">Ratio v1</div></div>'
    + '</div>';
  home.appendChild(h);

  // Group cards by chapter
  var chapters=[], seen={};
  mods.forEach(function(m){
    var ch = m.chapter || '__top__';
    if(!seen[ch]){ seen[ch]=true; chapters.push(ch); }
  });

  chapters.forEach(function(ch, ci){
    var lbl = CHAPTER_LABELS[ch];
    if(lbl){
      var div = mk('div','sec-div ci');
      div.style.animationDelay = (ci*20)+'ms';
      div.innerHTML = '<div class="sec-div-line sec-div-line-sm"></div><span class="sec-div-lbl">'+lbl+'</span><div class="sec-div-line"></div>';
      home.appendChild(div);
    }
    mods.filter(function(m){ return (m.chapter||'__top__')===ch; })
      .forEach(function(m, mi){
        home.appendChild(makeModCard(m, (ci*4+mi)*35));
      });
  });

  home.appendChild(makeFontBar());
  var pad=mk('div'); pad.style.height='16px'; home.appendChild(pad);
}

function makeModCard(m, delay){
  var card = mk('div', 'mc p-'+(m.palette||'general')+' ci');
  card.style.animationDelay = delay+'ms';

  if(m.palette==='gateway'){
    var row = mk('div','gw-row');
    row.innerHTML = '<div class="mc-icon" style="font-size:20px">'+m.icon+'</div>'
      +'<div class="mc-info"><div class="mc-name">'+m.name+'</div><div class="mc-sec">'+m.section+'</div></div>'
      +'<span class="mc-tag">'+m.tag+'</span>'
      +'<span style="color:var(--gold);font-size:18px;opacity:0.7;flex-shrink:0">\u203a</span>';
    card.appendChild(row);
    if(m.chips && m.chips.length){
      var chips=mk('div','gw-chips');
      m.chips.forEach(function(c){ chips.innerHTML+='<span class="gw-chip">'+c+'</span>'; });
      card.appendChild(chips);
    }
  } else if(m.palette==='tool'){
    card.innerHTML = '<div class="tool-ico">'+m.icon+'</div>'
      +'<div class="mc-info"><div class="mc-name">'+m.name+'</div><div class="mc-sec">'+m.section+'</div></div>'
      +'<span class="mc-tag">'+m.tag+'</span>';
  } else {
    card.innerHTML = '<div class="mc-icon">'+m.icon+'</div>'
      +'<div class="mc-info"><div class="mc-name">'+m.name+'</div><div class="mc-sec">'+m.section+'</div></div>'
      +'<span class="mc-tag">'+m.tag+'</span>';
  }

  card.addEventListener('click', function(){ openMod(m); });
  return card;
}

/* ═══════════════════════════════════════════════════════════
   MODULE OPEN
═══════════════════════════════════════════════════════════ */
function openMod(m){
  if(m.type==='module'){
    fetchJ(m.src)
      .then(function(data){
        CUR_MOD=data; CUR_IDX=0; CUR_RES=[];
        HISTORY.push({type:'home'});
        renderEl(data, 0);
      })
      .catch(function(){ toast('Module not yet available', '#4a3070'); });
  } else {
    toast('Coming in the next build', '#2c4a7e');
  }
}

/* ═══════════════════════════════════════════════════════════
   ELEMENT VIEW
═══════════════════════════════════════════════════════════ */
function renderEl(mod, idx){
  var el    = mod.els[idx];
  var total = mod.els.length;
  var main  = $('main');

  showScreen('main');
  updHeader('el', mod.name, el.name);
  main.innerHTML=''; main.scrollTop=0;
  main.className='on ci';

  /* Progress bar */
  var pb = mk('div','prog-bar');
  var pct = Math.round((idx+1)/total*100);
  pb.innerHTML = '<div class="prog-meta"><span>'+mod.name.toUpperCase()+'</span><span>'+(idx+1)+' of '+total+'</span></div>'
    +'<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
  main.appendChild(pb);

  /* Element header */
  main.appendChild(makeElHdr(el, mod.id));

  /* Connections (from links index) */
  var lks = getLinks(mod.id, el.id);
  if(lks.length) main.appendChild(makeConnRow(lks));

  /* Legal Position — open by default */
  main.appendChild(makeAcc('Legal Position', '#2c4a7e', makeLegalBody(el), true));

  /* Sparring Questions — closed by default */
  if(el.sq && el.sq.length)
    main.appendChild(makeAcc('\u2694 Sparring ('+el.sq.length+')', '#8b4513', makeSparBody(el.sq), false));

  /* Landmark Cases — closed by default */
  if(el.landmark && el.landmark.length)
    main.appendChild(makeAcc('\u2605 Landmark Cases ('+el.landmark.length+')', '#5c2a00', makeLMBody(el.landmark), false));

  /* Judgement */
  main.appendChild(makeJCard(el, idx, total, mod));

  /* Font bar + padding */
  main.appendChild(makeFontBar());
  var pad=mk('div'); pad.style.height='16px'; main.appendChild(pad);

  /* Floating arrow */
  fabSetup(main);
}

/* ── Element header ── */
function makeElHdr(el, modId){
  var hdr = mk('div','el-hdr');
  hdr.appendChild(txt(mk('div','el-step'), el.step));
  hdr.appendChild(txt(mk('div','el-name'), el.name));
  if(el.operator){
    hdr.appendChild(txt(mk('div','el-op'), el.operator));
  }
  hdr.appendChild(txt(mk('div','el-desc'), el.desc));

  /* Schedule II pills from sched2.json index */
  var sd = SCHED2[el.section];
  if(sd){
    var pr = mk('div','pills');
    if(sd.cog  !== undefined) pr.appendChild(txt(mk('span','pill '+(sd.cog?'pill-cog':'pill-ncog')),  sd.cog?'Cognizable':'Non-Cognizable'));
    if(sd.warr !== undefined) pr.appendChild(txt(mk('span','pill '+(sd.warr?'pill-warr':'pill-sum')), sd.warr?'Warrant':'Summons'));
    if(sd.bail !== undefined) pr.appendChild(txt(mk('span','pill '+(sd.bail?'pill-bail':'pill-nbail')),sd.bail?'Bailable':'Non-Bailable'));
    if(sd.comp !== undefined) pr.appendChild(txt(mk('span','pill '+(sd.comp?'pill-comp':'pill-ncomp')),sd.comp?'Compoundable':'Non-Compoundable'));
    hdr.appendChild(pr);
  }
  return hdr;
}

/* ── Connections ── */
function getLinks(modId, elId){
  var k = modId+'/'+elId;
  return (LINKS_FW[k]||[]).concat(LINKS_BK[k]||[]);
}
function makeConnRow(lks){
  var w = mk('div','conn-wrap');
  txt(mk('div','conn-lbl'), 'Connections').parentNode; // unused — just append
  var lbl = mk('div','conn-lbl'); lbl.textContent='Connections'; w.appendChild(lbl);
  var row = mk('div','conn-row');
  lks.forEach(function(l){
    var p = mk('span','conn-pill cp-'+(l.type||'element'));
    p.textContent = l.label;
    p.addEventListener('click', function(){ toast('Navigation — Phase 4', '#2c4a7e'); });
    row.appendChild(p);
  });
  w.appendChild(row);
  return w;
}

/* ── Accordion ── */
function makeAcc(title, accentColor, body, open){
  var sec  = mk('div','acc');
  var hdr  = mk('div','acc-hdr');
  var ttl  = mk('div','acc-ttl'); ttl.textContent=title;
  var chev = mk('div','acc-chev'); chev.textContent='\u203a';
  if(open){ ttl.style.color=accentColor; chev.classList.add('r'); }
  hdr.appendChild(ttl); hdr.appendChild(chev);

  var wrap = mk('div','aw'); if(open) wrap.classList.add('awo');
  var bd   = mk('div','acc-body'); bd.appendChild(body);
  wrap.appendChild(bd);

  hdr.addEventListener('click', function(){
    var isOpen = wrap.classList.contains('awo');
    wrap.classList.toggle('awo', !isOpen);
    chev.classList.toggle('r', !isOpen);
    ttl.style.color = !isOpen ? accentColor : '';
  });

  sec.appendChild(hdr); sec.appendChild(wrap);
  return sec;
}

/* ── Legal body ── */
function makeLegalBody(el){
  var w = mk('div');
  var lt = mk('div','legal-text');
  (el.legal||'').split('\n\n').forEach(function(p){
    if(!p.trim()) return;
    lt.appendChild(txt(mk('p','legal-p'), p.trim()));
  });
  w.appendChild(lt);
  if(el.cite){ w.appendChild(txt(mk('div','legal-cite'), el.cite)); }
  if(el.ll){
    var lnk = mk('div','legal-link');
    lnk.textContent = '\u2197 '+el.ll;
    w.appendChild(lnk);
  }
  return w;
}

/* ── Sparring body ── */
function makeSparBody(sqs){
  var w = mk('div');
  sqs.forEach(function(sq, i){
    var item = mk('div','sq');
    item.appendChild(txt(mk('div','sq-num'), 'Q'+(i+1)));
    var q = txt(mk('div','sq-q'), sq.q);
    var rv = mk('div','sq-rev-wrap');
    var ri = mk('div','sq-rev');
    ri.appendChild(txt(mk('div','sq-ans'), sq.reveal));
    if(sq.cite) ri.appendChild(txt(mk('div','sq-cite'), sq.cite));
    rv.appendChild(ri);
    q.addEventListener('click', function(){ rv.classList.toggle('o'); });
    item.appendChild(q); item.appendChild(rv);
    w.appendChild(item);
  });
  return w;
}

/* ── Landmark body ── */
function makeLMBody(cases){
  var w = mk('div');
  cases.forEach(function(c){
    var item = mk('div','lm');
    item.appendChild(txt(mk('div','lm-case'), c.case));
    var cit = mk('div','lm-cit');
    cit.appendChild(document.createTextNode(c.citation+'\u00a0'));
    if(c.verified){ cit.appendChild(txt(mk('span','lm-vbadge'), '\u2713 VERIFIED')); }
    item.appendChild(cit);
    item.appendChild(txt(mk('div','lm-hold'), c.holding));
    w.appendChild(item);
  });
  return w;
}

/* ── Judgement card ── */
function makeJCard(el, idx, total, mod){
  var card = mk('div','jcard');
  txt(mk('div','jlbl'), 'Your Judgement — Is This Element Established?').parentNode;
  var jlbl = mk('div','jlbl'); jlbl.textContent='Your Judgement \u2014 Is This Element Established?'; card.appendChild(jlbl);
  var btns = mk('div','jbtns');
  var yes  = mk('button','jbtn jyes'); yes.textContent='\u2713 Established';
  var no   = mk('button','jbtn jno');  no.textContent='\u2717 Absent';

  yes.addEventListener('click', function(){
    yes.classList.add('sel');
    yes.style.animation='jpulse 0.22s ease';
    setTimeout(function(){ yes.style.animation=''; },240);
    CUR_RES.push({id:el.id, result:'yes'});
    toast('\u2713 Established \u2014 proceeding', '#2c5f2e');
    setTimeout(function(){
      if(idx+1 < total){
        HISTORY.push({type:'el', mod:mod, idx:idx, res:CUR_RES.slice()});
        CUR_IDX=idx+1;
        renderEl(mod, idx+1);
      } else { showComplete(mod); }
    }, 900);
  });

  no.addEventListener('click', function(){
    no.classList.add('sel');
    no.style.animation='jpulse 0.22s ease';
    setTimeout(function(){ no.style.animation=''; },240);
    CUR_RES.push({id:el.id, result:'no'});
    toast('\u2717 Element absent \u2014 charge fails', '#8b2535');
    setTimeout(function(){ showTerminated(el, mod); }, 1200);
  });

  btns.appendChild(yes); btns.appendChild(no);
  card.appendChild(btns);
  return card;
}

/* ── Complete screen ── */
function showComplete(mod){
  var main=$('main'); main.innerHTML=''; main.scrollTop=0;
  var w=mk('div','result-wrap ci');
  w.innerHTML='<div class="result-icon">\u2705</div>'
    +'<div class="result-h">All Elements Established</div>'
    +'<div class="result-sub">'+mod.name+' \u2014 every element is made out on the facts.</div>'
    +'<button class="result-btn" onclick="goHome()">Return Home</button>';
  main.appendChild(w);
  main.appendChild(makeFontBar());
  updHeader('el', mod.name, 'Complete'); fabHide();
}

/* ── Terminated screen ── */
function showTerminated(el, mod){
  var main=$('main'); main.innerHTML=''; main.scrollTop=0;
  var w=mk('div','result-wrap ci');
  w.innerHTML='<div class="result-icon">\u274C</div>'
    +'<div class="result-h">Element Absent</div>'
    +'<div class="result-sub"><b>'+el.name+'</b> is not established on these facts.<br>The charge cannot be sustained.</div>'
    +'<button class="result-btn" onclick="goHome()">Return Home</button>';
  main.appendChild(w);
  main.appendChild(makeFontBar());
  updHeader('el', mod.name, 'Absent'); fabHide();
}

/* ═══════════════════════════════════════════════════════════
   FLOATING ARROW
═══════════════════════════════════════════════════════════ */
function fabSetup(scrollEl){
  var wrap=$('fabwrap'), fab=$('fab');
  wrap.style.display='block';

  function upd(){
    var bot = scrollEl.scrollTop+scrollEl.clientHeight >= scrollEl.scrollHeight-60;
    fab.innerHTML = bot ? '\u2191' : '\u2193';
    fab.dataset.d = bot ? 'up' : 'dn';
  }

  fab.onclick = function(){
    if(fab.dataset.d==='up') scrollEl.scrollTo({top:0,behavior:'smooth'});
    else scrollEl.scrollTo({top:scrollEl.scrollHeight,behavior:'smooth'});
  };

  scrollEl.onscroll = upd;
  scrollEl.onfocusin  = function(e){ if(e.target && (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')) fab.style.visibility='hidden'; };
  scrollEl.onfocusout = function(e){ if(e.target && (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')) fab.style.visibility='visible'; };
  upd();
}

function fabHide(){ $('fabwrap').style.display='none'; }

/* ═══════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════ */
var _tt = null;
function toast(msg, color){
  var t=$('toast');
  t.innerHTML='<div class="toast-inner" style="background:'+color+'">'+msg+'</div>';
  if(_tt) clearTimeout(_tt);
  _tt = setTimeout(function(){
    var inner=t.querySelector('.toast-inner');
    if(inner) inner.style.animation='toastOut 0.3s ease forwards';
    setTimeout(function(){ t.innerHTML=''; },320);
  }, 2000);
}

/* ═══════════════════════════════════════════════════════════
   FONT BAR
═══════════════════════════════════════════════════════════ */
function makeFontBar(){
  var bar=mk('div','font-bar');
  var lbl=mk('span','fb-lbl'); lbl.textContent='Text size'; bar.appendChild(lbl);
  var ps=mk('div','fb-btns');
  [12,13,15,16,18].forEach(function(sz){
    var b=mk('button','fpb');
    b.style.fontSize=sz+'px';
    b.textContent='A';
    b.setAttribute('data-sz',sz);
    if(sz===FS) b.classList.add('on');
    b.addEventListener('click', function(){ setFont(sz); });
    ps.appendChild(b);
  });
  bar.appendChild(ps);
  return bar;
}

function syncBars(){
  document.querySelectorAll('.fpb').forEach(function(b){
    b.classList.toggle('on', parseInt(b.getAttribute('data-sz'))===FS);
  });
}

function setFont(size){
  FS = size;
  var s = size/15;
  $('fs-override').textContent = ':root{'
    +'--fs-xs:'  +(0.68*s).toFixed(3)+'rem;'
    +'--fs-sm:'  +(0.78*s).toFixed(3)+'rem;'
    +'--fs-base:'+(0.88*s).toFixed(3)+'rem;'
    +'--fs-lg:'  +(1.02*s).toFixed(3)+'rem;'
    +'--fs-xl:'  +(1.25*s).toFixed(3)+'rem;'
    +'--fs-2xl:' +(1.55*s).toFixed(3)+'rem;'
    +'}';
  syncBars();
}
</script>
